<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body onload="pageLoaded()">

<h2 onmouseover="hoverTitle(this)" onmouseout="normalTitle(this)">
    Student Registration
</h2>

<form onsubmit="return validateForm()">

    <!-- Name -->
    <input type="text" id="name" placeholder="Enter Name"
           onfocus="focusField(this)"
           onblur="blurField(this)"
           onkeyup="showLength(this)">
    <span id="msg"></span>
    <br><br>

    <!-- Age -->
    <input type="text" id="age" placeholder="Enter Age"
           onkeypress="allowOnlyNumbers(event)"
           onkeyup="liveAgeCheck(this)">
    <br><br>

    <!-- Country -->
    <select id="country" onchange="countryChanged(this)">
        <option value="">Select Country</option>
        <option value="India">India</option>
        <option value="USA">USA</option>
    </select>
    <br><br>

    <!-- Button -->
<button type="submit" onclick="buttonClick()">
Submit
</button>
</form>
<script>
    
</body>
</html>
